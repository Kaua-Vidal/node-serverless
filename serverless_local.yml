service: computer-store-api
frameworkVersion: "3"

useDotenv: true

provider:
  name: aws
  runtime: nodejs24.x
  region: us-east-1
  stage: dev
  environment: ${file(./config/env.${self:provider.stage}.json):environment}

custom:
  serverless-offline:
    httpPort: 3001
    lambdaPort: 3002
    noPrependStageInUrl: false
    reloadHandler: true

plugins:
  - serverless-dotenv-plugin
  - serverless-offline

functions:
  createItem:
    handler: src/handlers/createItem.handle
    events:
      - http:
          path: /items
          method: post

  getAllItems:
    handler: src/handlers/getAllItems.handle
    events:
      - http:
          path: /items
          method: get

  getItemById:
    handler: src/handlers/getItemById.handle
    events:
      - http:
          path: /items/{id}
          method: get

  updateItem:
    handler: src/handlers/updateItem.handle
    events:
      - http:
          path: /items/{id}
          method: put

  deleteItem:
    handler: src/handlers/deleteItem.handle
    events:
      - http:
          path: /items/{id}
          method: delete
